<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploratory Testing Session Report</title>
    <link rel="stylesheet" href="preview.css">
    <script type="module" src="preview.js"></script>
    <script src="../lib/chart.umd.js"></script>
    <script src="../lib/jszip.min.js"></script>
</head>

<body>
    <div id="report" class="report">
        <!-- Header -->
        <header class="report-header">
            <div class="report-header__content">
                <h1 class="report-header__title">Exploratory Testing Report</h1>
                <p class="report-header__subtitle">Session Summary</p>
            </div>
        </header>

        <!-- Session Overview: Info + Stats + Chart -->
        <section class="section section--overview">
            <div id="sessionInfo" class="info-column"></div>
            <div id="statsCards" class="stats-column"></div>
            <div id="chartContainer" class="chart-column">
                <h3 class="chart-card__title">Distribution</h3>
                <canvas id="annotationsChart"></canvas>
            </div>
        </section>

        <section class="section">
            <div class="report-tabs" role="tablist" aria-label="Report sections">
                <button
                    class="report-tab-button is-active"
                    type="button"
                    role="tab"
                    id="reportTabActions"
                    aria-controls="reportPanelActions"
                    aria-selected="true"
                    data-report-tab="actions">
                    Actions
                </button>
                <button
                    class="report-tab-button"
                    type="button"
                    role="tab"
                    id="reportTabRecordFlow"
                    aria-controls="reportPanelRecordFlow"
                    aria-selected="false"
                    data-report-tab="record-flow">
                    Record Flow
                </button>
            </div>
        </section>

        <div id="reportPanelActions" class="report-tab-panel is-active" role="tabpanel" aria-labelledby="reportTabActions" data-report-panel="actions">
            <!-- Filters & Actions -->
            <section class="section">
                <div class="toolbar-card">
                    <div class="filter-section">
                        <span class="filter-section__label">Filter by type</span>
                        <div class="filter-pills">
                            <button class="filter-pill active" data-type="all">All</button>
                            <button class="filter-pill filter-pill--bug" data-type="Bug">Bugs</button>
                            <button class="filter-pill filter-pill--note" data-type="Note">Notes</button>
                        </div>
                    </div>
                    <div class="button-group">
                        <button id="downloadImagesBtn" class="btn-download btn-download--secondary" title="Download all screenshots">
                            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                                <path d="M5.5 6.5h7m-7 3h7m-7 3h4m5-10v12a1 1 0 01-1 1h-9a1 1 0 01-1-1v-12a1 1 0 011-1h9a1 1 0 011 1z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Download Images
                        </button>
                        <button id="downloadReportBtn" class="btn-download" title="Download complete report">
                            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                                <path d="M9 2v10m0 0l-3.5-3.5M9 12l3.5-3.5M3 14.5h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Download Report
                        </button>
                    </div>
                </div>
            </section>

            <!-- Annotations Table -->
            <section class="section section--table">
                <div class="table-wrapper">
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Description</th>
                                <th>URL</th>
                                <th>Date</th>
                                <th>Screenshots</th>
                                <th class="col-actions"></th>
                            </tr>
                        </thead>
                        <tbody id="annotationsTableBody"></tbody>
                    </table>
                </div>
            </section>
        </div>

        <div id="reportPanelRecordFlow" class="report-tab-panel" role="tabpanel" aria-labelledby="reportTabRecordFlow" data-report-panel="record-flow" hidden>
            <section class="section">
                <div id="recordingStateCard" class="state-card"></div>
            </section>

            <section class="section">
                <div class="recording-panel">
                    <div class="recording-panel__header">
                        <h3 class="recording-panel__title">Recorded Flow</h3>
                        <p class="recording-panel__subtitle">Steps and screenshots captured by the recorder are included in the exported state.</p>
                    </div>
                    <div id="recordingTimeline" class="recording-timeline"></div>
                </div>
            </section>
        </div>
    </div>

    <!-- Image Preview Overlays -->
    <div id="imagePreview" class="image-preview">
        <img src="" alt="Preview">
    </div>
    <div id="imageHoverPreview" class="image-hover-preview">
        <img src="" alt="Hover Preview">
    </div>
</body>

</html>
